<style>
body { font-family: 'Inter', sans-serif; background-color: #050505; color: #d1d5db; overflow-x: hidden; margin: 0; padding: 0; }

.letter-morph { display: inline; position: relative; }
.letter-morph::before { content: "x"; animation: morphToC 5s ease-in-out infinite; }
@keyframes morphToC {
  0%, 45% { content: "x"; opacity: 1; transform: rotate(0deg); }
  50% { opacity: 0; transform: rotate(180deg); }
  55%, 100% { content: "c"; opacity: 1; transform: rotate(360deg); }
}
.fade-in { animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
@keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
#dither-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; display: block; }
#ascii-text-container { position: relative; width: 100%; height: 250px; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: crosshair; overflow: hidden; }
@media (min-width: 640px) { #ascii-text-container { height: 300px; } }
#ascii-text-container canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; image-rendering: pixelated; pointer-events: none; }
#ascii-text-container pre { pointer-events: none; user-select: none; margin: 0; padding: 0; line-height: 1em; text-align: left; position: absolute; left: 0; top: 0; background-image: radial-gradient(circle, #818cf8 0%, #6366f1 50%, #4338ca 100%); background-attachment: fixed; -webkit-text-fill-color: transparent; -webkit-background-clip: text; background-clip: text; z-index: 9; mix-blend-mode: difference; }

.glass-button:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.1); }

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  var canvas = document.getElementById('dither-canvas');
  var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;

  var mouseX = 0, mouseY = 0;
  function onPointer(e) {
    if (e.touches && e.touches.length > 0) {
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    } else {
      mouseX = e.clientX;
      mouseY = e.clientY;
    }
  }
  document.addEventListener('mousemove', onPointer);
  document.addEventListener('touchmove', onPointer, { passive: true });
  document.addEventListener('touchstart', onPointer, { passive: true });

  function resize() {
    var dpr = window.devicePixelRatio || 1;
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);
  resize();

  var bayerValues = [
     0, 48, 12, 60,  3, 51, 15, 63,
    32, 16, 44, 28, 35, 19, 47, 31,
     8, 56,  4, 52, 11, 59,  7, 55,
    40, 24, 36, 20, 43, 27, 39, 23,
     2, 50, 14, 62,  1, 49, 13, 61,
    34, 18, 46, 30, 33, 17, 45, 29,
    10, 58,  6, 54,  9, 57,  5, 53,
    42, 26, 38, 22, 41, 25, 37, 21
  ];
  var bayerData = new Uint8Array(64);
  for (var i = 0; i < 64; i++) bayerData[i] = Math.round(bayerValues[i] * 255.0 / 63.0);

  var bayerTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, bayerTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.LUMINANCE, 8, 8, 0, gl.LUMINANCE, gl.UNSIGNED_BYTE, bayerData);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);

  var vsSource = [
    'attribute vec2 a_position;',
    'void main() {',
    '  gl_Position = vec4(a_position, 0.0, 1.0);',
    '}'
  ].join('\n');

  var fsSource = [
    'precision highp float;',
    'uniform vec2 resolution;',
    'uniform float time;',
    'uniform vec2 mousePos;',
    'uniform sampler2D bayerTex;',
    '',
    'vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}',
    'vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}',
    'vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}',
    'vec2 fade(vec2 t){return t*t*t*(t*(t*6.0-15.0)+10.0);}',
    '',
    'float cnoise(vec2 P){',
    '  vec4 Pi=floor(P.xyxy)+vec4(0,0,1,1);',
    '  vec4 Pf=fract(P.xyxy)-vec4(0,0,1,1);',
    '  Pi=mod289(Pi);',
    '  vec4 ix=Pi.xzxz,iy=Pi.yyww,fx=Pf.xzxz,fy=Pf.yyww;',
    '  vec4 i=permute(permute(ix)+iy);',
    '  vec4 gx=fract(i*(1.0/41.0))*2.0-1.0;',
    '  vec4 gy=abs(gx)-0.5;',
    '  vec4 tx=floor(gx+0.5);',
    '  gx=gx-tx;',
    '  vec2 g00=vec2(gx.x,gy.x),g10=vec2(gx.y,gy.y);',
    '  vec2 g01=vec2(gx.z,gy.z),g11=vec2(gx.w,gy.w);',
    '  vec4 norm=taylorInvSqrt(vec4(dot(g00,g00),dot(g01,g01),dot(g10,g10),dot(g11,g11)));',
    '  g00*=norm.x;g01*=norm.y;g10*=norm.z;g11*=norm.w;',
    '  float n00=dot(g00,vec2(fx.x,fy.x)),n10=dot(g10,vec2(fx.y,fy.y));',
    '  float n01=dot(g01,vec2(fx.z,fy.z)),n11=dot(g11,vec2(fx.w,fy.w));',
    '  vec2 fade_xy=fade(Pf.xy);',
    '  vec2 n_x=mix(vec2(n00,n01),vec2(n10,n11),fade_xy.x);',
    '  return 2.3*mix(n_x.x,n_x.y,fade_xy.y);',
    '}',
    '',
    'float fbm(vec2 p){',
    '  float v=0.0,a=1.0,f=3.0;',
    '  for(int i=0;i<4;i++){v+=a*abs(cnoise(p));p*=f;a*=0.3;}',
    '  return v;',
    '}',
    '',
    'float pattern(vec2 p){',
    '  return fbm(p+fbm(p-time*0.05));',
    '}',
    '',
    'void main(){',
    '  float pixelSize=2.0;',
    '  float colorNum=4.0;',
    '  vec2 uv=gl_FragCoord.xy/resolution;',
    '  vec2 uvN=uv-0.5;',
    '  uvN.x*=resolution.x/resolution.y;',
    '  float f=pattern(uvN);',
    '  vec2 mNDC=(mousePos/resolution-0.5)*vec2(1.0,-1.0);',
    '  mNDC.x*=resolution.x/resolution.y;',
    '  float dist=length(uvN-mNDC);',
    '  f-=0.5*(1.0-smoothstep(0.0,1.0,dist));',
    '  vec3 col=vec3(f*0.5);',
    '  vec2 sc=floor(gl_FragCoord.xy/pixelSize);',
    '  float threshold=texture2D(bayerTex,sc/8.0).r-0.25;',
    '  float s=1.0/(colorNum-1.0);',
    '  col+=threshold*s;',
    '  col=clamp(col-0.2,0.0,1.0);',
    '  col=floor(col*(colorNum-1.0)+0.5)/(colorNum-1.0);',
    '  gl_FragColor=vec4(col,1.0);',
    '}'
  ].join('\n');

  function createShader(type, source) {
    var s = gl.createShader(type);
    gl.shaderSource(s, source);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      gl.deleteShader(s);
      return null;
    }
    return s;
  }
  var vs = createShader(gl.VERTEX_SHADER, vsSource);
  var fs = createShader(gl.FRAGMENT_SHADER, fsSource);
  if (!vs || !fs) return;

  var program = gl.createProgram();
  gl.attachShader(program, vs);
  gl.attachShader(program, fs);
  gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS)) return;
  gl.useProgram(program);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  var pos = gl.getAttribLocation(program, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

  var uRes = gl.getUniformLocation(program, 'resolution');
  var uTime = gl.getUniformLocation(program, 'time');
  var uMouse = gl.getUniformLocation(program, 'mousePos');
  var uBayer = gl.getUniformLocation(program, 'bayerTex');

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, bayerTex);
  gl.uniform1i(uBayer, 0);

  var startTime = Date.now();
  function draw() {
    requestAnimationFrame(draw);
    if (canvas.width !== Math.floor(window.innerWidth * (window.devicePixelRatio || 1)) ||
        canvas.height !== Math.floor(window.innerHeight * (window.devicePixelRatio || 1))) {
      resize();
    }
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, (Date.now() - startTime) * 0.001);
    var dpr = window.devicePixelRatio || 1;
    gl.uniform2f(uMouse, mouseX * dpr, mouseY * dpr);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }
  draw();
})();
</script>

<script>
(function() {
  Math.map = function(n, s1, e1, s2, e2) {
    return ((n - s1) / (e1 - s1)) * (e2 - s2) + s2;
  };

  var PX_RATIO = window.devicePixelRatio || 1;
  var CHARSET = " .'`^\",:;Il!i~+_-?][}{1)(|/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$";

  function AsciiFilter(renderer) {
    this.renderer = renderer;
    this.domElement = document.createElement('div');
    this.domElement.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;';
    this.pre = document.createElement('pre');
    this.domElement.appendChild(this.pre);
    this.canvas = document.createElement('canvas');
    this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });
    this.domElement.appendChild(this.canvas);
    this.deg = 0;
    this.fontSize = 8;
    this.fontFamily = "'IBM Plex Mono', monospace";
    this.charset = CHARSET;
    this.mouse = { x: 0, y: 0 };
    this.center = { x: 0, y: 0 };
    var self = this;
    function onPointer(e) {
      var cx, cy;
      if (e.touches && e.touches.length > 0) {
        cx = e.touches[0].clientX;
        cy = e.touches[0].clientY;
      } else {
        cx = e.clientX;
        cy = e.clientY;
      }
      self.mouse = { x: cx * PX_RATIO, y: cy * PX_RATIO };
    }
    document.addEventListener('mousemove', onPointer);
    document.addEventListener('touchmove', onPointer, { passive: true });
  }

  AsciiFilter.prototype.setSize = function(w, h) {
    this.width = w;
    this.height = h;
    this.renderer.setSize(w, h);
    this.ctx.font = this.fontSize + 'px ' + this.fontFamily;
    var cw = this.ctx.measureText('A').width;
    this.cols = Math.floor(w / (this.fontSize * (cw / this.fontSize)));
    this.rows = Math.floor(h / this.fontSize);
    this.canvas.width = this.cols;
    this.canvas.height = this.rows;
    this.pre.style.fontFamily = this.fontFamily;
    this.pre.style.fontSize = this.fontSize + 'px';
    this.pre.style.margin = '0';
    this.pre.style.padding = '0';
    this.pre.style.lineHeight = '1em';
    this.pre.style.position = 'absolute';
    this.pre.style.left = '0';
    this.pre.style.top = '0';
    this.pre.style.zIndex = '9';
    this.pre.style.backgroundAttachment = 'fixed';
    this.pre.style.mixBlendMode = 'difference';
    this.center = { x: w / 2, y: h / 2 };
    this.mouse = { x: this.center.x, y: this.center.y };
  };

  AsciiFilter.prototype.render = function(scene, camera) {
    this.renderer.render(scene, camera);
    var w = this.canvas.width, h = this.canvas.height;
    this.ctx.clearRect(0, 0, w, h);
    if (w && h) this.ctx.drawImage(this.renderer.domElement, 0, 0, w, h);
    if (w && h) {
      var d = this.ctx.getImageData(0, 0, w, h).data;
      var s = '';
      for (var y = 0; y < h; y++) {
        for (var x = 0; x < w; x++) {
          var i = (x + y * w) * 4;
          if (d[i + 3] === 0) { s += ' '; continue; }
          var gray = (0.3 * d[i] + 0.6 * d[i + 1] + 0.1 * d[i + 2]) / 255;
          var idx = this.charset.length - 1 - Math.floor((1 - gray) * (this.charset.length - 1));
          s += this.charset[idx];
        }
        s += '\n';
      }
      this.pre.textContent = s;
    }
    var dx = this.mouse.x - this.center.x;
    var dy = this.mouse.y - this.center.y;
    var deg = (Math.atan2(dy, dx) * 180) / Math.PI;
    this.deg += (deg - this.deg) * 0.075;
    this.domElement.style.filter = 'hue-rotate(' + this.deg.toFixed(1) + 'deg)';
    this.domElement.style.webkitFilter = 'hue-rotate(' + this.deg.toFixed(1) + 'deg)';
  };

  var container = document.getElementById('ascii-text-container');

  function startAscii() {
    var w = container.clientWidth;
    var h = container.clientHeight;
    if (w === 0 || h === 0) {
      requestAnimationFrame(startAscii);
      return;
    }

    var txtCanvas = document.createElement('canvas');
    var txtCtx = txtCanvas.getContext('2d');
    var isMobile = w < 500;
    var fontSizePx = isMobile ? 100 : 200;
    var font = '600 ' + fontSizePx + 'px "IBM Plex Mono"';
    var txt = 'memory';

    document.fonts.load(font).then(function() {}).catch(function() {}).finally(function() {
      txtCtx.font = font;
      var m = txtCtx.measureText(txt);
      txtCanvas.width = Math.ceil(m.width) + 20;
      txtCanvas.height = Math.ceil(m.actualBoundingBoxAscent + m.actualBoundingBoxDescent) + 20;
      txtCtx.clearRect(0, 0, txtCanvas.width, txtCanvas.height);
      txtCtx.fillStyle = '#fdf9f3';
      txtCtx.font = font;
      var m2 = txtCtx.measureText(txt);
      txtCtx.fillText(txt, 10, 10 + m2.actualBoundingBoxAscent);

      var texture = new THREE.CanvasTexture(txtCanvas);
      texture.minFilter = THREE.NearestFilter;

      var aspect = txtCanvas.width / txtCanvas.height;
      var baseH = isMobile ? 8 : 15;

      var textVS = [
        'varying vec2 vUv;',
        'uniform float uTime;',
        'uniform float uEnableWaves;',
        'void main() {',
        '  vUv = uv;',
        '  float t = uTime * 5.0;',
        '  float wf = uEnableWaves;',
        '  vec3 p = position;',
        '  p.x += sin(t + position.y) * 0.5 * wf;',
        '  p.y += cos(t + position.z) * 0.15 * wf;',
        '  p.z += sin(t + position.x) * wf;',
        '  gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);',
        '}'
      ].join('\n');

      var textFS = [
        'varying vec2 vUv;',
        'uniform float uTime;',
        'uniform sampler2D uTexture;',
        'void main() {',
        '  float t = uTime;',
        '  vec2 p = vUv;',
        '  float r = texture2D(uTexture, p + cos(t*2.0-t+p.x)*.01).r;',
        '  float g = texture2D(uTexture, p + tan(t*0.5+p.x-t)*.01).g;',
        '  float b = texture2D(uTexture, p - cos(t*2.0+t+p.y)*.01).b;',
        '  float a = texture2D(uTexture, p).a;',
        '  gl_FragColor = vec4(r, g, b, a);',
        '}'
      ].join('\n');

      var scene = new THREE.Scene();
      var camera = new THREE.PerspectiveCamera(45, w / h, 1, 1000);
      camera.position.z = isMobile ? 30 : 50;

      var mesh = new THREE.Mesh(
        new THREE.PlaneGeometry(baseH * aspect, baseH, 36, 36),
        new THREE.ShaderMaterial({
          vertexShader: textVS,
          fragmentShader: textFS,
          transparent: true,
          uniforms: {
            uTime: { value: 0 },
            uTexture: { value: texture },
            uEnableWaves: { value: 1.0 }
          }
        })
      );
      scene.add(mesh);

      var renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
      renderer.setPixelRatio(1);
      renderer.setClearColor(0x000000, 0);

      var filter = new AsciiFilter(renderer);
      container.appendChild(filter.domElement);
      filter.setSize(w, h);

      var mouse = { x: w / 2, y: h / 2 };
      function onPointer(evt) {
        var cx, cy;
        if (evt.touches && evt.touches.length > 0) {
          cx = evt.touches[0].clientX;
          cy = evt.touches[0].clientY;
        } else {
          cx = evt.clientX;
          cy = evt.clientY;
        }
        var b = container.getBoundingClientRect();
        mouse = { x: cx - b.left, y: cy - b.top };
      }
      document.addEventListener('mousemove', onPointer);
      document.addEventListener('touchmove', onPointer, { passive: true });

      window.addEventListener('resize', function() {
        var nw = container.clientWidth;
        var nh = container.clientHeight;
        if (nw > 0 && nh > 0) {
          w = nw;
          h = nh;
          camera.aspect = nw / nh;
          camera.updateProjectionMatrix();
          filter.setSize(nw, nh);
        }
      });

      function animate() {
        requestAnimationFrame(animate);
        var t = Date.now() * 0.001;
        mesh.material.uniforms.uTime.value = Math.sin(t);
        var rx = Math.map(mouse.y, 0, h, 0.5, -0.5);
        var ry = Math.map(mouse.x, 0, w, -0.5, 0.5);
        mesh.rotation.x += (rx - mesh.rotation.x) * 0.05;
        mesh.rotation.y += (ry - mesh.rotation.y) * 0.05;
        filter.render(scene, camera);
      }
      animate();
    });
  }
  startAscii();
})();
</script>
